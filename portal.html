<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FUTUROLOGÍA / Internal Dossier</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/crt.css" />
  </head>
  <body class="screen screen-portal">
    <div class="crt-overlay" aria-hidden="true"></div>

    <main class="panel dossier" aria-labelledby="dossier-title">
      <header class="dossier-header">
        <p><span>STATUS</span> PRELIMINARY</p>
        <p><span>ACCESS</span> LIMITED</p>
        <p><span>UNIT</span> FTRLG / EXPERIENTIAL ENGINEERING</p>
        <p><span>CIRCULATION</span> INTERNAL</p>
      </header>

      <section class="dossier-intro">
        <div class="header-signal" aria-hidden="true">
          <div class="ftrlg-logo"></div>
        </div>
        <h1 id="dossier-title">Internal Circular</h1>
        <p id="visitor-greeting">Welcome, participant.</p>
      </section>

      <article id="payload-content" class="payload-content" aria-live="polite" aria-busy="true">
        <p>Decrypting memorandum…</p>
      </article>

      <footer class="dossier-footer">
        <button id="exit-node" type="button">Exit node</button>
        <nav aria-label="Future expansions">
          <span class="pending-link" aria-disabled="true">PDF module · pending</span>
          <span class="pending-link" aria-disabled="true">Response channel · pending</span>
          <span class="pending-link" aria-disabled="true">Alt version · pending</span>
        </nav>
      </footer>
    </main>

    <script src="assets/js/config.js" defer></script>
    <script src="assets/js/ui-effects.js" defer></script>
    <script src="assets/data/payload.js" defer></script>
    <script src="assets/js/portal.js" defer></script>
  </body>
</html>
