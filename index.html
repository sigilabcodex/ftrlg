<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FUTUROLOGÍA / Access Node</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/crt.css" />
  </head>
  <body class="screen screen-access">
    <div class="crt-overlay" aria-hidden="true"></div>

    <main class="panel access-panel" aria-labelledby="node-title">
      <p class="eyebrow">RESTRICTED CIRCULATION · INTERNAL NODE</p>
      <div class="ftrlg-logo" aria-hidden="true"></div>
      <h1 id="node-title">FUTUROLOGÍA / <span>ftrlg</span></h1>
      <p class="subtitle">Access Node · Preliminary experiential engineering dossier</p>

      <form id="access-form" class="access-form" novalidate aria-describedby="access-feedback">
        <label for="participant-name">Participant designation</label>
        <input id="participant-name" name="participantName" type="text" autocomplete="name" required />

        <label for="access-code">Node code</label>
        <input id="access-code" name="accessCode" type="password" autocomplete="off" required />

        <button type="submit">Request dossier access</button>
      </form>

      <p class="status-line" role="status" aria-live="polite" id="access-feedback">
        Node idle. Awaiting credential pair.
      </p>
    </main>

    <script src="assets/js/config.js" defer></script>
    <script src="assets/js/ui-effects.js" defer></script>
    <script src="assets/js/access.js" defer></script>
  </body>
</html>
